apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clouddeploy-redis-pvc
  namespace: clouddeploy-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clouddeploy-redis
  namespace: clouddeploy-system
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command:
            - redis-server
            - --requirepass
            - clouddeploy_redis_secret
            - --appendonly
            - "yes"
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-storage
              mountPath: /data
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: clouddeploy-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: clouddeploy-system
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis
