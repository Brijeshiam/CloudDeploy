apiVersion: v1
kind: Secret
metadata:
  name: {{PROJECT_SLUG}}-secret
  namespace: {{NAMESPACE}}
  labels:
    app: {{PROJECT_SLUG}}
    app.kubernetes.io/managed-by: clouddeploy
    clouddeploy/project-id: "{{PROJECT_ID}}"
  annotations:
    clouddeploy/updated-at: "{{UPDATED_AT}}"
    clouddeploy/synced-from: "clouddeploy-envvars"
type: Opaque
data:
  # Sensitive environment variables (isSecret=true) stored here as base64.
  # CloudDeploy encrypts these in its own database and decrypts only when syncing.
  # Values below are base64-encoded (not plaintext).
  {{SECRET_VARS}}
