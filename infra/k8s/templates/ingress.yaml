apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{PROJECT_SLUG}}-ingress
  namespace: {{NAMESPACE}}
  labels:
    app: {{PROJECT_SLUG}}
    app.kubernetes.io/managed-by: clouddeploy
    clouddeploy/project-id: "{{PROJECT_ID}}"
  annotations:
    # Ingress class
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ingress.class: nginx

    # SSL / TLS — cert-manager will auto-provision the certificate
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"

    # WebSocket support (for Socket.io streaming)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

    # Force HTTPS redirect
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # CORS (if needed by user's app)
    nginx.ingress.kubernetes.io/enable-cors: "{{CORS_ENABLED}}"
    nginx.ingress.kubernetes.io/cors-allow-origin: "{{CORS_ORIGIN}}"

    clouddeploy/created-at: "{{CREATED_AT}}"
    clouddeploy/domain: "{{DOMAIN}}"

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{DOMAIN}}
      secretName: {{PROJECT_SLUG}}-tls
  rules:
    - host: {{DOMAIN}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{PROJECT_SLUG}}-service
                port:
                  number: 80
