apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clouddeploy-ingress
  namespace: clouddeploy-system
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false" # Set true if TLS is active
    nginx.ingress.kubernetes.io/proxy-body-size: "100m" # allow larger image uploads / git actions
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: app.clouddeploy.local
      http:
        paths:
          # Backend API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          # Real-time WebSocket connection
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          # Frontend static assets
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
