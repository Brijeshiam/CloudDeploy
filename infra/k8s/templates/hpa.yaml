apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{PROJECT_SLUG}}-hpa
  namespace: {{NAMESPACE}}
  labels:
    app: {{PROJECT_SLUG}}
    app.kubernetes.io/managed-by: clouddeploy
    clouddeploy/project-id: "{{PROJECT_ID}}"
  annotations:
    clouddeploy/created-at: "{{CREATED_AT}}"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{PROJECT_SLUG}}-deployment

  # Scale between minReplicas and maxReplicas based on CPU/Memory
  minReplicas: {{MIN_REPLICAS}}
  maxReplicas: {{MAX_REPLICAS}}

  metrics:
    # CPU-based scaling — scale up when average CPU > threshold
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{CPU_THRESHOLD}}

    # Memory-based scaling — scale up when average memory > threshold
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{MEMORY_THRESHOLD}}

  # Scaling behavior: conservative scale-down, aggressive scale-up
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
