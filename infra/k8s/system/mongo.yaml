apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clouddeploy-mongo-pvc
  namespace: clouddeploy-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clouddeploy-mongodb
  namespace: clouddeploy-system
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          environment:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: admin
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: clouddeploy_secret
            - name: MONGO_INITDB_DATABASE
              value: clouddeploy
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: clouddeploy-mongo-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: clouddeploy-system
spec:
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: mongodb
